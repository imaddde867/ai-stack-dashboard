global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: llama_server
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8080

  - job_name: qwen_exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:9108
